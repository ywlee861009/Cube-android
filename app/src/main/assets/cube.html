<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cube</title>
  <link rel="stylesheet" href="css/cube.css">
</head>
<body>
<div id="solved-overlay" class="hidden">
  <div id="solved-card">
    <div id="solved-emoji">🎉</div>
    <div id="solved-title">Solved!</div>
    <div id="solved-stats">
      <div class="s-stat">
        <span class="s-val" id="s-time">—</span>
        <span class="s-lbl">Time</span>
      </div>
      <div class="s-stat">
        <span class="s-val" id="s-moves">—</span>
        <span class="s-lbl">Moves</span>
      </div>
    </div>
    <div id="solved-new-best" class="hidden">New Best!</div>
    <div id="solved-pb" class="hidden">
      <div class="pb-divider"></div>
      <div id="solved-pb-stats">
        <div class="s-stat">
          <span class="s-val" id="s-pb-time">—</span>
          <span class="s-lbl pb-lbl">Best Time</span>
        </div>
        <div class="s-stat">
          <span class="s-val" id="s-pb-moves">—</span>
          <span class="s-lbl pb-lbl">Best Moves</span>
        </div>
      </div>
    </div>
    <button id="btn-play-again" onclick="playAgain()">⇄ Play Again</button>
  </div>
</div>

<div id="moves">Moves: 0</div>
<button id="btn-theme" aria-label="Toggle dark mode">🌙</button>
<div id="ui">
  <div class="ui-row">
    <button id="btn-undo" onclick="undoCube()" disabled>↩ Undo</button>
    <button id="btn-redo" onclick="redoCube()" disabled>Redo ↪</button>
  </div>
  <div class="ui-row">
    <button id="btn-shuffle" onclick="shuffleCube()">⇄ Shuffle</button>
    <button id="btn-solve"   onclick="solveCube()">📺 Solve</button>
  </div>
</div>

<!-- Libraries -->
<script src="js/lib/confetti.min.js"></script>
<script src="js/three.min.js"></script>

<!-- Core cube -->
<script src="js/constants.js"></script>
<script src="js/scene.js"></script>
<script src="js/cubies.js"></script>
<script src="js/logic.js"></script>

<!-- Solver -->
<script src="js/lib/cubing-solver.bundle.js"></script>
<script src="js/solver/solver-base.js"></script>
<script src="js/solver/solver-cubing.js"></script>
<script src="js/solver/solver-factory.js"></script>

<!-- Game state & actions -->
<script src="js/actions.js"></script>
<script src="js/overlay.js"></script>
<script src="js/scoring.js"></script>
<script src="js/history.js"></script>
<script src="js/solve.js"></script>
<script src="js/shuffle.js"></script>

<!-- Animation & interaction -->
<script src="js/animation.js"></script>
<script src="js/layer-rotation.js"></script>
<script src="js/layer-snap.js"></script>
<script src="js/touch.js"></script>

<!-- Bridge -->
<script src="js/bridge.js"></script>

<!-- UI extras -->
<script src="js/theme.js"></script>
<script src="js/long-press.js"></script>
</body>
</html>
