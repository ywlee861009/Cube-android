<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cube</title>
  <style>
    :root {
      --safe-top: 0px;
      --safe-bottom: 0px;
      --safe-left: 0px;
      --safe-right: 0px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }
    #ui {
      position: fixed; 
      bottom: calc(40px + var(--safe-bottom)); 
      left: var(--safe-left); 
      right: var(--safe-right);
      display: flex; justify-content: center; gap: 16px;
    }
    button {
      background: rgba(255,255,255,0.15);
      color: #fff; border: 1px solid rgba(255,255,255,0.3);
      border-radius: 10px; padding: 12px 28px;
      font-size: 15px; cursor: pointer;
    }
    button:active { background: rgba(255,255,255,0.3); }
    #moves {
      position: fixed; 
      top: calc(20px + var(--safe-top)); 
      left: var(--safe-left); 
      right: var(--safe-right);
      text-align: center; color: rgba(255,255,255,0.6); font-size: 14px;
    }
  </style>
</head>
<body>
<div id="moves">Moves: 0</div>
<div id="ui">
  <button onclick="shuffleCube()">Shuffle</button>
  <button onclick="resetCube()">Reset</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="js/constants.js"></script>
<script src="js/scene.js"></script>
<script src="js/cubies.js"></script>
<script src="js/logic.js"></script>
<script src="js/actions.js"></script>
<script src="js/controls.js"></script>
<script src="js/bridge.js"></script>
</body>
</html>
