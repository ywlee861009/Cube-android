<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cube</title>
  <style>
    :root {
      --safe-top: 0px;
      --safe-bottom: 0px;
      --safe-left: 0px;
      --safe-right: 0px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f0f0; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; }
    #ui {
      position: fixed;
      bottom: calc(40px + var(--safe-bottom));
      left: var(--safe-left);
      right: var(--safe-right);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .ui-row { display: flex; justify-content: center; gap: 12px; }
    button {
      background: rgba(0,0,0,0.07);
      color: #222; border: 1px solid rgba(0,0,0,0.18);
      border-radius: 10px; padding: 12px 28px;
      font-size: 15px; cursor: pointer;
    }
    #btn-undo, #btn-redo {
      padding: 10px 24px;
      font-size: 18px;
    }
    button:active { background: rgba(0,0,0,0.15); }
    button:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
    #moves {
      position: fixed;
      top: calc(20px + var(--safe-top));
      left: var(--safe-left);
      right: var(--safe-right);
      text-align: center; color: rgba(0,0,0,0.45); font-size: 14px;
    }
  </style>
</head>
<body>
<div id="moves">Moves: 0</div>
<div id="ui">
  <div class="ui-row">
    <button id="btn-undo" onclick="undoCube()" disabled>↩ Undo</button>
    <button id="btn-redo" onclick="redoCube()" disabled>Redo ↪</button>
  </div>
  <div class="ui-row">
    <button id="btn-shuffle" onclick="shuffleCube()">Shuffle</button>
    <button id="btn-solve"   onclick="solveCube()">Solve</button>
    <button id="btn-reset"   onclick="resetCube()">Reset</button>
  </div>
</div>

<script src="js/three.min.js"></script>
<script src="js/constants.js"></script>
<script src="js/scene.js"></script>
<script src="js/cubies.js"></script>
<script src="js/logic.js"></script>
<script src="js/lib/cubing-solver.bundle.js"></script>
<script src="js/solver/solver-base.js"></script>
<script src="js/solver/solver-cubing.js"></script>
<script src="js/solver/solver-factory.js"></script>
<script src="js/actions.js"></script>
<script src="js/history.js"></script>
<script src="js/solve.js"></script>
<script src="js/animation.js"></script>
<script src="js/layer-rotation.js"></script>
<script src="js/touch.js"></script>
<script src="js/bridge.js"></script>
</body>
</html>
